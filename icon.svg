<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#1a1a2e"/>
  <!-- horizontal mirror line -->
  <rect x="32" y="248" width="448" height="16" rx="8" fill="#e94560" opacity="0.85"/>
  <!-- white king (top half) -->
  <text x="256" y="210" text-anchor="middle" font-family="serif" font-size="180" fill="#f0f0f0">♔</text>
  <!-- black king (bottom half, flipped) -->
  <g transform="translate(256,300) scale(1,-1) translate(-256,0)">
    <text x="256" y="-86" text-anchor="middle" font-family="serif" font-size="180" fill="#c0c0c0" opacity="0.85">♚</text>
  </g>
</svg>
